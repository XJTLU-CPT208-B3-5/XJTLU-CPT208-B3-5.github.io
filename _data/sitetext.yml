#
# Work based on https://github.com/mmistakes/minimal-mistakes/blob/master/_data/ui-text.yml
#
# Configuration: Add to _config.yml
# locale: "en-US"  [YOUR PREFERRED LOCALE]
#
# How to use:
# {{ site.data.ui-text[site.locale].<var_name> | default: 'text' }}

# English (default)
# -----------------
en: &DEFAULT_EN
  header:
    title: Campus Navigator
    text: A Playful Campus Navigation App for XJTLU
    button: Learn More
    buttonlink: "#motivation"

  services:
    title: "1. Motivation & Research"
    text: "Why we chose this track and what gap we identified"
    section: motivation
    list:
      - title: "The Why"
        desc: "200-word statement on why our group chose the Active track for campus navigation - focusing on making campus exploration fun, interactive, and engaging for students and visitors."
        icon: fas fa-bullseye
      - title: "The Gap"
        desc: "Analysis of 4 academic papers and 4 commercial products - what they did well and what they missed in terms of playful interaction and gamification."
        icon: fas fa-search
      - title: "The Stakeholders"
        desc: "Primary users: New students, international students, visitors. Secondary users: Staff, faculty, campus tour groups. Distinct personas defined with specific needs."
        icon: fas fa-users

  portfolio:
    title: "2. User Requirements"
    text: "Understanding our users and their journey"
    section: requirements
    closebutton: "Close Project"

  timeline:
    title: "3. Ideation & Alternatives"
    text: "From crazy ideas to final design decisions"
    section: ideation
    # left is the default
    #start_align: "left"
    events:
      - title: "Crazy Eights Sketches"
        year: "Phase 1"
        desc: "8 rapid hand-drawn UI sketches exploring different navigation concepts and playful interactions."
        image: assets/img/timeline/1.jpg
        alt:
      - title: "Design Alternatives"
        year: "Phase 2"
        desc: "Compared 2-3 different system approaches: Map-based, List-based, and Gamified AR navigation. Chose gamified approach for better engagement."
        image: assets/img/timeline/2.jpg
        alt:
      - title: "Low-Fi Prototype"
        year: "Phase 3"
        desc: "Clickable Figma prototype testing navigation flow and playful elements."
        image: assets/img/timeline/3.jpg
        alt: Figma prototype link
        align: right
    end: "From Ideation <br> to Implementation!"

  about:
    title: "4. Technical Implementation"
    text: "System architecture and development"
    section: implementation
    body: "System Architecture: Web App data flow diagram | High-Fi Prototype: [yourproject.github.io](#) | Individual Contributions: Team member breakdown"
    section: implementation

  clients:
    section: evaluation
    max-height: 100px
    horizontal-scrolling: "" #"yes/no"
    list:
      - title: "Usability Testing"
        url: "#evaluation"
        logo: assets/img/clients/envato.jpg
      - title: "Iterative Refinement"
        url: "#evaluation"
        logo: assets/img/clients/designmodo.jpg
      - title: "Final Reflection"
        url: "#evaluation"
        logo: assets/img/clients/themeforest.jpg

  team:
    title: "TEAM B3-5"
    text: "CPT208 - Human-Computer Interaction Project"
    subtext: "4 members working on a playful campus navigation app for XJTLU"
    section: team
    people:
      - name: "Team Member 1"
        role: "Project Lead & Developer"
        image: assets/img/team/500x500.jpg
        social:
          - url: https://github.com
            icon: fab fa-github
      - name: "Team Member 2"
        role: "UI/UX Designer"
        image: assets/img/team/2.jpg
        social:
          - url: https://github.com
            icon: fab fa-github
      - name: "Team Member 3"
        role: "Content & Research"
        image: assets/img/team/500x500.jpg
        social:
          - url: https://github.com
            icon: fab fa-github
      - name: "Team Member 4"
        role: "Testing & Evaluation"
        image: assets/img/team/2.jpg
        social:
          - url: https://github.com
            icon: fab fa-github

  contact:
    title: "5. Evaluation & Reflection"
    text: "Usability testing results and social implications"
    section: evaluation
    name: "Name*"
    name-validation: "Please enter your name."
    email: "Email*"
    email-validation: "Please enter your email address."
    phone: "Phone Number"
    phone-validation: "Please enter your phone number."
    message: "Message*"
    message-validation: "Please enter a message."
    subject: "Contact Form Submission"
    submit: "Send Message"

  footer:
    legal: "Privacy Policy"
    social:
      - url: https://twitter.com
        icon: "fab fa-twitter"
      - url: https://facebook.com
        icon: "fab fa-facebook-f"
      - url: https://linkedin.com
        icon: "fab fa-linkedin-in"
      - url: https://github.com/raviriley/agency-jekyll-theme
        icon: "fab fa-github"
      - url: https://instagram.com
        icon: "fab fa-instagram"
en-US:
  <<: *DEFAULT_EN
en-CA:
  <<: *DEFAULT_EN
en-GB:
  <<: *DEFAULT_EN
en-AU:
  <<: *DEFAULT_EN

